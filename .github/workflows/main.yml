name: Unity CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤1: 拉取代码
      - uses: actions/checkout@v4

      # 步骤2: 激活 Unity 许可证
      - uses: game-ci/unity-actions/activate@v4

      # 步骤3: 编译项目（只检查代码是否报错，不需要打包）
      - name: Build
        uses: game-ci/unity-actions/build@v4
